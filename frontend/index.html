<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='80' font-size='90' font-family='Arial' font-weight='bold' fill='%23ff6b81' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <img id="site-logo" src="assets/img/logo.png" alt="Logo">
                    Portfolio
                </div>
                <ul class="nav-links">
                    <li><a href="#home">Trang chủ</a></li>
                    <li><a href="#skills">Kỹ năng</a></li>
                    <li><a href="#experience">Kinh nghiệm</a></li>
                    <li><a href="#contact">Liên hệ</a></li>
                    <li><a href="admin.html" class="btn btn-primary" style="padding: 5px 15px;">Admin</a></li>
                </ul>
                <div class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="home" class="hero container">
            <div class="hero-content">
                <div class="hero-left">
                    <h1 class="hero-title">Xin chào, mình là <br><span id="profile-name">Loading...</span></h1>
                    <h2 id="profile-title" class="hero-subtitle">Loading...</h2>
                    <p id="profile-about" class="hero-about glass-panel">Loading...</p>
                    <div class="hero-buttons">
                        <a href="#contact" class="btn btn-primary">Liên hệ ngay</a>
                        <a href="#" id="btn-view-cv" class="btn btn-secondary"
                            style="display: none; align-items: center; justify-content: center;" target="_blank"><i
                                class="fas fa-file-pdf" style="margin-right: 5px;"></i> Xem / Tải CV</a>
                    </div>
                </div>

                <div class="hero-right">
                    <div class="avatar-wrapper glass-panel">
                        <img id="profile-avatar" src="https://via.placeholder.com/150" alt="Avatar">
                    </div>
                    <div class="video-wrapper">
                        <iframe id="profile-video" src="" title="Video Giới thiệu" allowfullscreen
                            style="width: 100%; height: 100%; object-fit: cover; border-radius: 15px; position: absolute; top: 0; left: 0; border: none;"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="container">
            <h2 class="section-title">Kỹ năng nổi bật</h2>
            <div id="skills-container" class="skills-grid">
                <!-- Data loaded via JS -->
            </div>
        </section>

        <!-- Experience Section -->
        <section id="experience" class="container">
            <h2 class="section-title">Kinh nghiệm & Học tập</h2>
            <div id="experience-container" class="timeline">
                <!-- Data loaded via JS -->
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="container">
            <h2 class="section-title">Liên hệ</h2>
            <div id="contact-container" class="contact-grid">
                <!-- Data loaded via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Bản quyền thuộc về <span id="footer-name">Loading...</span>.</p>
    </footer>

    <!-- Scripts -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
